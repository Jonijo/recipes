spring:
  application:
    name: recipes
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:recipes}
    username: ${POSTGRES_USER:recipes}
    password: ${POSTGRES_PASSWORD:recipes}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-change-me-dev-only-change-me-dev-only}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    org.springframework.security: INFO
